name: Android Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Monorepo Dependencies
        run: |
          npm install

      - name: Generate Release Keystore
        run: |
          mkdir -p android/app
          if [ ! -f android/app/release.keystore ]; then
            keytool -genkey -v -keystore android/app/release.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "alicncvpn123" -keypass "alicncvpn123" -dname "CN=AliCNC, OU=AliCNCVPN, O=AliCNCVPN, L=Islamabad, S=Federal, C=PK"
          fi
        env:
          KEYSTORE_PASSWORD: "alicncvpn123"
          KEY_PASSWORD: "alicncvpn123"
          KEY_ALIAS: "my-key-alias"

      - name: Build Android Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.storeFile=release.keystore \
            -Pandroid.injected.signing.storePassword=alicncvpn123 \
            -Pandroid.injected.signing.keyAlias=my-key-alias \
            -Pandroid.injected.signing.keyPassword=alicncvpn123
        env:
          NODE_ENV: production

      - name: Upload Production APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
